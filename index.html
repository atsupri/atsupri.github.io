<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>王子高 文化祭アプリ</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- FontAwesome (アイコン用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- カスタムCSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ⚠️ グローバル遅延アラートバー -->
    <div id="global-alert" class="alert-bar" style="display: none;">
        <div class="alert-content">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="alert-message">ステージ進行に遅れが出ています。</span>
        </div>
        <button class="alert-close-btn" onclick="closeAlertBar()">&times;</button>
    </div>

    <!-- 📱 ヘッダーナビゲーション -->
    <header class="app-header">
        <button class="menu-toggle-btn" onclick="toggleSidebar()">
            <i class="fa-solid fa-bars"></i>
        </button>
        <h1 class="app-title">王子高 文化祭案内</h1>
        <div style="width: 40px;"></div>
    </header>

    <!-- 📂 ドロワーメニュー＆サイドバー（検索機能をここに集約！） -->
    <div id="menu-overlay" class="menu-overlay" onclick="toggleSidebar()"></div>
    <aside id="sidebar" class="app-sidebar">
        <div class="sidebar-header">
            <h2>メニュー & 全館検索</h2>
            <button class="sidebar-close-btn" onclick="toggleSidebar()">&times;</button>
        </div>
        
        <!-- 🔍 サイドバー内：全館検索エリア -->
        <div class="sidebar-search-section">
            <div class="search-bar-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="sidebar-search-box" placeholder="全階層からお店を検索..." oninput="filterSidebarShops()">
            </div>
            <!-- 検索結果がここにリアルタイム表示される -->
            <div id="sidebar-search-results" class="sidebar-results-list"></div>
        </div>

        <nav class="sidebar-nav">
            <div class="sidebar-divider">メニュー</div>
            <button onclick="openModal('modal-notice')"><i class="fa-solid fa-bullhorn"></i> 重要なお知らせ</button>
            <button onclick="openModal('modal-greeting')"><i class="fa-solid fa-comment-dots"></i> 開催のご挨拶</button>
            <button onclick="openModal('modal-push')"><i class="fa-solid fa-bell"></i> プッシュ通知設定</button>
            
            <div class="sidebar-divider">🛠️ 管理者シミュレーター</div>
            <div class="admin-panel">
                <label for="admin-target-select">対象ステージ:</label>
                <select id="admin-target-select"></select>
                <div class="admin-buttons">
                    <button class="admin-btn delay" onclick="simulateDelay(15)">15分遅延</button>
                    <button class="admin-btn delay" onclick="simulateDelay(30)">30分遅延</button>
                    <button class="admin-btn reset" onclick="simulateDelay(0)">通常通りに戻す</button>
                </div>
            </div>
        </nav>
    </aside>

    <!-- 📦 メインコンテンツエリア -->
    <main class="app-main">

        <!-- 🗺️ ページ1：マップ＆出店一覧 -->
        <section id="map-page" class="app-page active">
            <!-- 階層切り替え用タブ -->
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchFloor('1F')">1階</button>
                <button class="tab-btn" onclick="switchFloor('2F')">2階</button>
                <button class="tab-btn" onclick="switchFloor('3F')">3階</button>
                <button class="tab-btn" onclick="switchFloor('4F')">4階</button>
            </div>

            <!-- Leafletマップ土台 -->
            <div id="map"></div>

            <!-- ジャンルフィルター（メイン画面用） -->
            <div class="filter-section">
                <div class="tag-container">
                    <button class="tag-btn active" onclick="filterTag('すべて', this)">全て</button>
                    <button class="tag-btn" onclick="filterTag('食品', this)">🍛 食品販売</button>
                    <button class="tag-btn" onclick="filterTag('展示', this)">🎨 展示・部活</button>
                    <button class="tag-btn" onclick="filterTag('アトラクション', this)">🎮 体験・催し</button>
                </div>
            </div>

            <!-- 出店アコーディオンリスト（選んでいる階のものだけスッキリ表示） -->
            <h3 id="floor-title" class="section-title">1Fの出店一覧</h3>
            <div id="shop-list-container" class="shop-list"></div>
        </section>

        <!-- ⏱️ ページ2：タイムライン -->
        <section id="timeline-page" class="app-page">
            <div class="day-selector">
                <button id="day1-btn" class="day-btn active" onclick="switchDay(1)">1日目 (通常開催)</button>
                <button id="day2-btn" class="day-btn" onclick="switchDay(2)">2日目 (一般公開)</button>
            </div>
            <div class="timeline-wrapper">
                <div id="timeline-container"></div>
            </div>
        </section>

    </main>

    <!-- 📌 フッター固定ナビゲーションタブ -->
    <footer class="app-footer">
        <button class="page-tab-btn active" onclick="switchPage('map-page')">
            <i class="fa-solid fa-map-location-dot"></i>
            <span>校内マップ</span>
        </button>
        <button class="page-tab-btn" onclick="switchPage('timeline-page')">
            <i class="fa-solid fa-clock"></i>
            <span>タイムライン</span>
        </button>
    </footer>

    <!-- 各種モーダル群 -->
    <div id="modal-notice" class="modal" onclick="closeModalOnOverlay(event, 'modal-notice')">
        <div class="modal-content">
            <div class="modal-header"><h3>📢 重要なお知らせ</h3><button onclick="closeModal('modal-notice')">&times;</button></div>
            <ul id="notice-list-container" class="modal-body-list"></ul>
        </div>
    </div>

    <div id="modal-greeting" class="modal" onclick="closeModalOnOverlay(event, 'modal-greeting')">
        <div class="modal-content">
            <div class="modal-header"><h3>🤝 開催のご挨拶</h3><button onclick="closeModal('modal-greeting')">&times;</button></div>
            <div id="greeting-list-container" class="modal-body-text"></div>
        </div>
    </div>

    <div id="modal-push" class="modal" onclick="closeModalOnOverlay(event, 'modal-push')">
        <div class="modal-content">
            <div class="modal-header"><h3>🔔 通知設定</h3><button onclick="closeModal('modal-push')">&times;</button></div>
            <div class="modal-body-p">
                <p>現在のステータス: <b id="push-status-text">未確認</b></p>
                <p class="desc-text">通知を許可すると、ステージの遅延情報や緊急アナウンスがリアルタイムで画面に届くようになります。</p>
                <button id="push-request-btn" class="push-action-btn" onclick="requestNotificationPermission()">通知を有効にする</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- カスタムJS -->
    <script src="script.js"></script>
</body>
</html>
